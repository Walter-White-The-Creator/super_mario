<!DOCTYPE html> <!--dit is het document type-->
<html lang="nl-BE">
    <head>
        <meta charset="UTF-8">
        <title>Super Mario</title>
        <link rel="stylesheet" href="../CSS/style.css">
    </head>
    <body>
        <div class="game-board">
            <h1>klik de vraagtekens voor coins</h1>
            <p>hoe meer hoe beter!</p>

            <div class="button-grid">
                <button class="coin-button" data-button="1">Knop 1</button>
                <button class="coin-button" data-button="2">Knop 2</button>
                <button class="coin-button" data-button="3">Knop 3</button>
                <button class="coin-button" data-button="4">Knop 4</button>
            </div>

            <div class="gif-area">
                <img id="mijn-gif" src="../MEDIA/gif.gif" alt="coin gif">
            </div>

            <div id="message">Klik één van de vier knoppen om de GIF te zien.</div>
            <a class="home-link" href="../index.html">startpagina</a>
        </div>

        <script>
            const gif = document.getElementById('mijn-gif');
            const message = document.getElementById('message');
            const buttons = document.querySelectorAll('.coin-button');

            buttons.forEach(button => {
                button.addEventListener('click', () => {
                    const buttonNumber = button.dataset.button;
                    gif.style.display = 'block';
                    message.textContent = `Knop ${buttonNumber} is aangeklikt! De GIF verschijnt bovenaan.`;
                    // Verberg de GIF weer na 2 seconden
                    clearTimeout(window.gifTimeout);
                    window.gifTimeout = setTimeout(() => {
                        gif.style.display = 'none';
                    }, 2000);
                });
            });
        </script>
    </body>
</html>
