<!DOCTYPE html>
<html lang="nl-BE">
<head>
  <meta charset="UTF-8">
  <title>Super Mario - Spel</title>
  <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
    <a href="../index.html">Terug naar startpagina</a>

  <div class="blok" id="blok1">
    <img class="coin" src="../MEDIA/gif.gif" alt="coin">
    <button class="knop" onclick="toonCoin(this)"></button>
  </div>

  <div class="blok" id="blok2">
    <img class="coin" src="../MEDIA/gif_-_kopie.gif" alt="coin">
    <button class="knop" onclick="toonCoin(this)"></button>
  </div>

  <div class="blok" id="blok3">
    <img class="coin" src="../MEDIA/gif_-_kopie__2_.gif" alt="coin">
    <button class="knop" onclick="toonCoin(this)"></button>
  </div>

  <div class="blok" id="blok4">
    <img class="coin" src="../MEDIA/gif_-_kopie__3_.gif" alt="coin">
    <button class="knop" onclick="toonCoin(this)"></button>
  </div>

  <script>
    function toonCoin(knop) {
      var coin = knop.parentElement.querySelector('.coin');
      coin.classList.remove('actief');
      void coin.offsetWidth;
      coin.classList.add('actief');
      setTimeout(function() { coin.classList.remove('actief'); }, 750);
    }
  </script>

</body>
</html>
