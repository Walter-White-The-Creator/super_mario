<!DOCTYPE html>
<!-- Spelpagina met 4 interactieve vraagteken-blokken -->
<html lang="nl-BE">
  <head>
    <meta charset="UTF-8">
    <title>Super Mario – Spel</title>
    <!-- Externe CSS koppelen -->
    <link rel="stylesheet" href="../css/style.css">
  </head>
  <body class="spel-pagina">

    <!-- Header met logo en titel -->
    <header>
      <img src="../media/vraagteken.png" alt="logo" class="logo">
      <h1>Super Mario – Spel</h1>
    </header>

    <!-- Navigatiebalk -->
    <nav>
      <a href="../index.html">Home</a>
      <a href="game.html">Spel</a>
    </nav>

    <!-- Spelgebied met 4 blokken -->
    <main class="speelveld">

      <!-- Blok 1: knop met coin-animatie -->
      <div class="blok">
        <img class="coin" src="../media/coin1.gif" alt="coin">
        <button class="knop" onclick="toonCoin(this)"></button>
      </div>

      <!-- Blok 2 -->
      <div class="blok">
        <img class="coin" src="../media/coin2.gif" alt="coin">
        <button class="knop" onclick="toonCoin(this)"></button>
      </div>

      <!-- Blok 3 -->
      <div class="blok">
        <img class="coin" src="../media/coin3.gif" alt="coin">
        <button class="knop" onclick="toonCoin(this)"></button>
      </div>

      <!-- Blok 4 -->
      <div class="blok">
        <img class="coin" src="../media/coin4.gif" alt="coin">
        <button class="knop" onclick="toonCoin(this)"></button>
      </div>

      <!-- Scoreteller (datastructuur + controlestructuur in app.js) -->
      <p id="score">Coins: 0</p>

    </main>

    <!-- Voettekst met schooladres -->
    <footer>
      <table>
        <tr><th>School</th><td>GO! Atheneum</td></tr>
        <tr><th>Adres</th><td>Schoolstraat 1, 1000 Brussel</td></tr>
      </table>
    </footer>

    <!-- Externe JavaScript koppelen -->
    <script src="../js/app.js"></script>

  </body>
</html>
